version: phase5.v1

run_tracking:
  enabled: true
  default_run_mode: exploratory
  formal_requires_clean_worktree: true
  fail_on_duplicate_run_id: true
  manifest_filename: run_manifest.json

artifacts:
  default_root: data/reports/generated
  write_manifest: true
  index_files: true
  hash_files: true
  csv_row_count: true

data_fingerprint:
  full_file_hash: true
  duckdb_table_mode: metadata
  max_dirty_files: 50

factor_values:
  duplicate_policy: fail
  overwrite_requires_flag: true

daily_report:
  data_quality:
    min_price_coverage: 0.8
    min_valuation_coverage: 0.8
    min_factor_stock_coverage: 0.8
    min_hard_filter_coverage: 0.8
    allow_missing_announcements: true
    allow_missing_risk_events: true
    required_schema_version: 4
