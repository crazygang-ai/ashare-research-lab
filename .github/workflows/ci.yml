name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: ashare-research-lab
          cache-environment: true

      - name: Install package
        run: |
          "$MAMBA_EXE" run -r "$MAMBA_ROOT_PREFIX" -n ashare-research-lab python -m pip install -e .

      - name: Build data dictionary
        run: |
          "$MAMBA_EXE" run -r "$MAMBA_ROOT_PREFIX" -n ashare-research-lab python docs/build_data_dictionary.py

      - name: Check generated docs
        run: git diff --exit-code docs/data_dictionary.md

      - name: Test
        env:
          _TYPER_FORCE_DISABLE_TERMINAL: "1"
        run: |
          "$MAMBA_EXE" run -r "$MAMBA_ROOT_PREFIX" -n ashare-research-lab pytest -q
