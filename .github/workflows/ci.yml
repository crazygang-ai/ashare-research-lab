name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - uses: mamba-org/setup-micromamba@v2
        with:
          environment-file: environment.yml
          environment-name: ashare-research-lab
          cache-environment: true

      - name: Install package
        run: conda run -n ashare-research-lab python -m pip install -e .

      - name: Build data dictionary
        run: conda run -n ashare-research-lab python docs/build_data_dictionary.py

      - name: Check generated docs
        run: git diff --exit-code docs/data_dictionary.md

      - name: Test
        run: conda run -n ashare-research-lab pytest -q
